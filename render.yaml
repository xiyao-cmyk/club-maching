databases:
  - name: club-matching-db
    databaseName: club_matching
    user: club_user
    plan: free

services:
  - type: web
    name: club-matching-app
    env: node
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: club-matching-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
