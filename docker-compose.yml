version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: club_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: club_matching
      MYSQL_USER: club_user
      MYSQL_PASSWORD: club_pass123
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: club_redis
    restart: always
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: club_backend
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: club_user
      DB_PASSWORD: club_pass123
      DB_DATABASE: club_matching
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: club-matching-jwt-secret-2026
      NODE_ENV: production
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: club_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  mysql_data:
